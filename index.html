<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏫2026 창1원명지여자고등학교 전공 로드맵 챌린지</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --khu-red: #cc0000; --khu-blue: #004d99; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; margin: 0; padding: 15px; background: #f4f4f9; color: #333; line-height: 1.4; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.2rem; color: var(--khu-red); margin: 5px 0; }
        
        select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 1rem; margin-bottom: 15px; background: white; }
        
        .info-box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .info-title { font-weight: bold; font-size: 0.9rem; color: #666; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .math-chips { display: flex; flex-wrap: wrap; gap: 5px; }
        .chip { padding: 6px 12px; border-radius: 15px; font-size: 0.85rem; font-weight: 500; }
        .chip.math { background: #eef4ff; color: var(--khu-blue); border: 1px solid #d0e0ff; }
        .chip.sci { background: white; border: 1px solid #ddd; cursor: grab; touch-action: none; }

        .game-area { display: flex; flex-direction: column; gap: 15px; }
        .drop-zone-container { background: #fff; padding: 12px; border-radius: 12px; border: 2px solid #eee; }
        .drop-zone-container.target-core { border-color: #ffd700; background: #fffdf0; }
        .drop-zone-container.target-rec { border-color: #90ee90; background: #f0fff0; }
        
        .zone-label { font-weight: bold; font-size: 0.85rem; margin-bottom: 8px; display: block; }
        .drop-zone { min-height: 60px; display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-start; }

        .btn-check { width: 100%; padding: 15px; background: var(--khu-red); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; margin-top: 20px; }
        .footer-note { font-size: 0.75rem; color: #888; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="header">
    <h1>🏫2026 창원명지여고 교육과정 박람회 과학과 로드맵 챌린지💡</h1>
    <p style="font-size:0.8rem;">2028학년도 경희대학교 교과이수 권장과목 수정안 반영</p>
</div>

<select id="majorSelect" onchange="initGame()">
    <option value="">지원하고자 하는 모집단위를 선택하세요</option>
    </select>

<div id="content" style="display:none;">
    <div class="info-box">
        <div class="info-title">수학 교과 핵심/권장 과목</div>
        <div id="mathDisplay" class="math-chips"></div>
    </div>

    <div class="game-area">
        <div class="drop-zone-container">
            <span class="zone-label">🧪 과학교과 주머니 (드래그하세요)</span>
            <div id="sciPool" class="drop-zone"></div>
        </div>

        <div class="drop-zone-container target-core">
            <span class="zone-label">⭐ 핵심과목 (필수적 이수 권장)</span>
            <div id="coreZone" class="drop-zone"></div>
        </div>

        <div class="drop-zone-container target-rec">
            <span class="zone-label">✅ 권장과목 (가급적 이수 권장)</span>
            <div id="recZone" class="drop-zone"></div>
        </div>
    </div>

    <button class="btn-check" onclick="checkResult()">결과 확인하기</button>
    <p class="footer-note">※ 이수 과목 수에 따른 정량적 가·감점은 없으며 정성평가에 반영됩니다.</p>
</div>

<script>
// 경희대 데이터 추출본 반영 
const data = {
    "수학과/응용수학과": { 
        mCore: ["대수", "미적분Ⅰ", "확률과 통계", "미적분Ⅱ", "기하"], mRec: [], 
        sCore: [], sRec: [] 
    },
    "소프트웨어융합/인공지능/컴퓨터공학": { 
        mCore: ["대수", "미적분Ⅰ", "확률과 통계", "미적분Ⅱ", "기하"], mRec: ["인공지능 수학"], 
        sCore: [], sRec: [] 
    },
    "산업경영공학과": { 
        mCore: ["대수", "미적분Ⅰ", "확률과 통계", "미적분Ⅱ"], mRec: [], 
        sCore: [], sRec: [] 
    },
    "물리학과/응용물리학과": { 
        mCore: ["대수", "미적분Ⅰ", "확률과 통계", "미적분Ⅱ", "기하"], mRec: [], 
        sCore: ["물리학", "역학과 에너지", "전자기와 양자"], sRec: ["화학", "물질과 에너지"] 
    },
    "기계공학부": { 
        mCore: ["대수", "미적분Ⅰ", "확률과 통계", "미적분Ⅱ", "기하"], mRec: [], 
        sCore: ["물리학", "화학", "역학과 에너지", "전자기와 양자"], sRec: [] 
    },
    "미래정보디스플레이/생체의공/전자/반도체공학": { 
        mCore: ["대수", "미적분Ⅰ", "확률과 통계", "미적분Ⅱ", "기하"], mRec: [], 
        sCore: ["물리학", "화학", "역학과 에너지", "전자기와 양자"], sRec: [] 
    },
    "건축공학/사회기반시스템공학": { 
        mCore: ["대수", "미적분Ⅰ", "확률과 통계", "미적분Ⅱ"], mRec: ["기하"], 
        sCore: ["물리학"], sRec: [] 
    },
    "건축학과": { 
        mCore: ["대수", "미적분Ⅰ", "확률과 통계"], mRec: ["미적분Ⅱ", "기하"], 
        sCore: [], sRec: ["물리학"] 
    },
    "화학과/응용화학과": { 
        mCore: ["대수", "미적분Ⅰ", "확률과 통계", "미적분Ⅱ"], mRec: ["기하"], 
        sCore: ["화학", "물질과 에너지", "화학 반응의 세계"], sFlex: ["역학과 에너지", "전자기와 양자"], sFlexCount: 1, sRec: ["물리학", "생명과학"] 
    },
    "원자력공학/신소재공학과": { 
        mCore: ["대수", "미적분Ⅰ", "확률과 통계", "미적분Ⅱ", "기하"], mRec: [], 
        sCore: ["물리학", "화학", "물질과 에너지", "역학과 에너지"], sRec: ["전자기와 양자", "화학 반응의 세계"] 
    },
    "화학공학과": { 
        mCore: ["대수", "미적분Ⅰ", "확률과 통계", "미적분Ⅱ"], mRec: ["기하"], 
        sCore: ["물리학", "화학", "물질과 에너지", "화학 반응의 세계"], sRec: ["역학과 에너지", "전자기와 양자"] 
    },
    "생물학과/스마트팜과학과": { 
        mCore: ["대수", "미적분Ⅰ", "확률과 통계"], mRec: ["미적분Ⅱ"], 
        sCore: ["화학", "생명과학", "세포와 물질대사", "생물의 유전"], sRec: ["물리학"] 
    },
    "식품영양/식품생명/유전생명/환경학및환경공학": { 
        mCore: ["대수", "미적분Ⅰ", "확률과 통계"], mRec: ["미적분Ⅱ"], 
        sCore: ["화학", "생명과학", "세포와 물질대사", "생물의 유전"], sRec: ["물질과 에너지", "화학 반응의 세계"] 
    },
    "융합바이오신소재공학과": { 
        mCore: ["대수", "미적분Ⅰ", "확률과 통계"], mRec: ["미적분Ⅱ"], 
        sCore: ["화학", "생명과학", "물질과 에너지", "화학 반응의 세계", "세포와 물질대사", "생물의 유전"], sRec: [] 
    },
    "지리학과": { 
        mCore: ["대수", "미적분Ⅰ", "확률과 통계"], mRec: [], 
        sCore: ["지구과학"], sRec: [] 
    },
    "우주과학과": { 
        mCore: ["대수", "미적분Ⅰ", "확률과 통계", "미적분Ⅱ"], mRec: ["기하"], 
        sCore: ["물리학", "화학", "지구과학", "역학과 에너지", "전자기와 양자"], sFlex: ["지구시스템과학", "행성우주과학"], sFlexCount: 1, sRec: [] 
    },
    "의예과": { 
        mCore: ["대수", "미적분Ⅰ", "확률과 통계", "미적분Ⅱ"], mRec: [], 
        sCore: ["화학", "생명과학"], sFlex: ["물질과 에너지", "화학 반응의 세계", "세포와 물질대사", "생물의 유전"], sFlexCount: 3, sRec: ["물리학"] 
    },
    "한의예과/치의예과": { 
        mCore: ["대수", "미적분Ⅰ", "확률과 통계", "미적분Ⅱ"], mRec: [], 
        sCore: ["화학", "생명과학", "세포와 물질대사", "생물의 유전"], sFlex: ["물질과 에너지", "화학 반응의 세계"], sFlexCount: 1, sRec: ["물리학"] 
    },
    "약학과/한약학과/약과학과": { 
        mCore: ["대수", "미적분Ⅰ", "확률과 통계", "미적분Ⅱ"], mRec: [], 
        sCore: ["화학", "생명과학"], sFlex: ["물질과 에너지", "화학 반응의 세계", "세포와 물질대사", "생물의 유전"], sFlexCount: 3, sRec: ["물리학"] 
    },
    "간호학과": { 
        mCore: ["대수", "미적분Ⅰ", "확률과 통계"], mRec: ["미적분Ⅱ"], 
        sCore: ["생명과학", "세포와 물질대사", "생물의 유전"], sRec: ["화학", "물질과 에너지", "화학 반응의 세계"] 
    }
};

const sciSubjects = ["물리학", "역학과 에너지", "전자기와 양자", "화학", "물질과 에너지", "화학 반응의 세계", "생명과학", "세포와 물질대사", "생물의 유전", "지구과학", "지구시스템과학", "행성우주과학"];

// 초기화: 드롭다운 생성
const select = document.getElementById('majorSelect');
Object.keys(data).forEach(m => {
    const opt = document.createElement('option');
    opt.value = m; opt.innerText = m; select.appendChild(opt);
});

function initGame() {
    const major = select.value;
    if(!major) return;
    
    const content = document.getElementById('content');
    const gameArea = document.querySelector('.game-area'); 
    const btnCheck = document.querySelector('.btn-check'); 
    
    content.style.display = 'block';

    // 1. 수학 과목 표시 로직 추가
    const mDisp = document.getElementById('mathDisplay');
    mDisp.innerHTML = '';
    data[major].mCore.forEach(s => {
        mDisp.innerHTML += `<span class="chip math">${s}(핵심)</span>`;
    });
    data[major].mRec.forEach(s => {
        mDisp.innerHTML += `<span class="chip math" style="opacity:0.7; background:#f0f0f0; color:#666; border-color:#ccc;">${s}(권장)</span>`;
    });

    // 기존 안내 문구(specialNotice)가 있다면 먼저 제거
    const oldNotice = document.getElementById('specialNotice');
    if(oldNotice) oldNotice.remove();

    // 2. 과학 과목이 아예 없는 학과인 경우
    if (data[major].sCore.length === 0 && (data[major].sRec ? data[major].sRec.length === 0 : true)) {
        gameArea.style.display = 'none'; 
        btnCheck.style.display = 'none'; 
        
        const notice = document.createElement('div');
        notice.id = "specialNotice";
        notice.innerHTML = `
            <div style="padding:40px 20px; text-align:center; background:#f0f7ff; border-radius:12px; border:1px solid #d0e0ff; margin-top:20px;">
                <p style="font-size:1.2rem; margin-bottom:10px;">📐</p>
                <strong style="color:#004d99;">${major}</strong>는<br>
                과학교과 권장과목이 지정되지 않았습니다.<br>
                <small style="display:block; margin-top:10px; color:#666;">이 모집단위는 수학적 기초 역량이<br>무엇보다 중요하게 평가됩니다!</small>
            </div>
        `;
        content.appendChild(notice);
    } else {
        // 3. 과학 과목이 있는 학과는 정상 게임 진행
        gameArea.style.display = 'flex';
        btnCheck.style.display = 'block';
        
        // 과학 주머니들 초기화
        const pool = document.getElementById('sciPool');
        const coreZone = document.getElementById('coreZone');
        const recZone = document.getElementById('recZone');
        
        pool.innerHTML = '';
        coreZone.innerHTML = '';
        recZone.innerHTML = '';
        
        // 과학 과목 칩 생성 (랜덤 섞기)
        const shuffledSci = [...sciSubjects].sort(() => Math.random() - 0.5);
        shuffledSci.forEach(s => {
            pool.innerHTML += `<div class="chip sci" data-name="${s}">${s}</div>`;
        });

        // 드래그앤드롭 다시 활성화 (SortableJS)
        [pool, coreZone, recZone].forEach(el => {
            // 기존 인스턴스가 있다면 파괴하고 새로 생성 (중복 방지)
            if (Sortable.get(el)) Sortable.get(el).destroy();
            new Sortable(el, { 
                group: 'sci', 
                animation: 150,
                ghostClass: 'blue-background-class' 
            });
        });
    }
}
function checkResult() {
    const major = select.value;
    if (!major) return;

    const coreUser = Array.from(document.getElementById('coreZone').children).map(c => c.dataset.name);
    const recUser = Array.from(document.getElementById('recZone').children).map(c => c.dataset.name);
    const target = data[major];
    let isCorrect = true;

    // --- 1. 핵심과목 주머니 검사 ---
    // 필수 핵심과목이 모두 포함되었는가?
    target.sCore.forEach(s => { if(!coreUser.includes(s)) isCorrect = false; });

    // sFlex가 '핵심'으로 가야 하는 학과 (의예, 약학 계열)
    if(target.sFlex && (major.includes("의예") || (major.includes("약학") && !major.includes("한약")))) {
        const flexInCore = target.sFlex.filter(s => coreUser.includes(s)).length;
        if(flexInCore !== target.sFlexCount) isCorrect = false;
        
        coreUser.forEach(u => {
            if (!target.sCore.includes(u) && !target.sFlex.includes(u)) isCorrect = false;
        });
    } else {
        // 그 외 모든 학과(화학, 우주 등): 핵심 주머니엔 sCore만 있어야 함
        if (coreUser.length !== target.sCore.length) isCorrect = false;
        coreUser.forEach(u => { if (!target.sCore.includes(u)) isCorrect = false; });
    }

    // --- 2. 권장과목 주머니 검사 ---
    // 필수 권장과목이 모두 포함되었는가?
    target.sRec.forEach(s => { if(!recUser.includes(s)) isCorrect = false; });

    // sFlex가 '권장'으로 가야 하는 학과 (화학, 우주, 한의예, 치의예 등)
    if(target.sFlex && (major.includes("화학과") || major.includes("우주과학") || major.includes("한의예") || major.includes("치의예"))) {
        const flexInRec = target.sFlex.filter(s => recUser.includes(s)).length;
        if(flexInRec !== target.sFlexCount) isCorrect = false;

        // 권장 주머니 오답 체크 (필수권장 + 선택권장만 허용)
        recUser.forEach(u => {
            if (!target.sRec.includes(u) && !target.sFlex.includes(u)) isCorrect = false;
        });
    } else {
        // 의예/약학처럼 sFlex가 이미 핵심으로 간 경우: 권장 주머니엔 sRec만 있어야 함
        if (recUser.length !== target.sRec.length) isCorrect = false;
        recUser.forEach(u => { if (!target.sRec.includes(u)) isCorrect = false; });
    }

    // --- 3. 결과 모션 출력 ---
    if (isCorrect) {
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#cc0000', '#ffd700', '#ffffff'] });
        alert("정답입니다! 🎉\n복잡한 선택 과목 조건까지 완벽하게 맞히셨습니다!");
    } else {
        // [실패] 네모난 종이가 아닌 '동근 빗방울' 모션
        const duration = 2000; 
        const end = Date.now() + duration;

        (function frame() {
            confetti({
                particleCount: 2,      // 한 번에 나오는 양을 적게 해서 줄기처럼 보이게
                angle: 270,            // 정확히 아래로
                spread: 40,            // 약간의 퍼짐
                origin: { x: Math.random(), y: -0.2 }, 
                colors: ['#22A6B3', '#3867D6', '#74b9ff'], 
                shapes: ['circle'],    // ★핵심: 사각형 빼고 원형만 사용
                gravity: 1.8,          // 더 빠르게 떨어지도록
                scalar: 0.5,           // ★핵심: 입자 크기를 작게 해서 물방울 느낌
                ticks: 200,            // 화면 끝까지 유지
                drift: 0               // 옆으로 흐르지 않게
            });

            if (Date.now() < end) {
                requestAnimationFrame(frame);
            }
        }());

        // 알림창이 효과를 가리지 않도록 약간 늦게 띄웁니다.
        setTimeout(() => alert("다시 한번 시도해 보세요! 😭\n과목 배치가 틀렸거나 개수가 맞지 않습니다."), 500);
    }
